<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - Guild Glory</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:url("https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=1600&q=80");
background-size:cover;
background-position:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* DARK OVERLAY */
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
}

.box{
position:relative;
width:340px;
padding:25px;
background:rgba(20,20,20,0.9);
border:1px solid #ff6a00;
border-radius:15px;
box-shadow:0 0 20px #ff6a0060;
text-align:center;
backdrop-filter:blur(6px);
}

h2{
color:#ff6a00;
margin-bottom:18px;
text-shadow:0 0 10px #ff6a00;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
outline:none;
border-radius:8px;
background:#111;
color:white;
border:1px solid #333;
}

/* TERMS BOX */
.terms{
text-align:left;
font-size:12px;
margin-top:10px;
color:#ccc;
display:flex;
gap:8px;
align-items:flex-start;
}

.terms input{
width:auto;
margin-top:3px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
background:#ff6a00;
color:white;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 15px #ff6a00;
}

button:hover{
transform:scale(1.03);
}

a{
color:#ff6a00;
text-decoration:none;
font-size:13px;
}

.small{
font-size:11px;
color:#aaa;
margin-top:10px;
}

</style>
</head>

<body>

<div class="box">

<h2>💀 CREATE ACCOUNT</h2>

<form method="POST">

<input type="email" name="email" placeholder="Enter Email" required>

<input type="password" name="password" placeholder="Enter Password" required>

<!-- TERMS & CONDITIONS -->
<div class="terms">
<input type="checkbox" name="terms" required>
<label>
I agree to the Terms & Conditions of Guild Glory Panel. I understand credits and system rules.
</label>
</div>

<button type="submit">🔥 REGISTER</button>

</form>

<p class="small">
By registering, you accept our system policies.
</p>

<br>

<a href="/login">Already have an account? Login</a>

</div>

</body>
</html>
