<!DOCTYPE html>
<html>
<head>
    <title>Redeem Code</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:#0d0d0d;
            color:white;
        }

        .top{
            background:#111;
            padding:15px;
            text-align:center;
            color:#ff4500;
            font-size:20px;
            font-weight:bold;
            border-bottom:2px solid #ff4500;
        }

        .box{
            padding:20px;
        }

        .card{
            background:#181818;
            padding:20px;
            border-radius:10px;
            margin-top:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
            border-radius:6px;
            border:none;
        }

        button{
            width:100%;
            margin-top:10px;
            padding:10px;
            background:#ff4500;
            color:white;
            border:none;
            border-radius:6px;
        }

        .msg{
            margin-top:10px;
            color:#00ff88;
        }

        .bottom{
            position:fixed;
            bottom:0;
            width:100%;
            display:flex;
            justify-content:space-around;
            background:#111;
            padding:10px;
            border-top:2px solid #ff4500;
        }

        .bottom a{
            color:white;
            text-decoration:none;
        }

    </style>
</head>

<body>

<div class="top">
    🎁 REDEEM CODE
</div>

<div class="box">

    <div class="card">
        <p>Current Credits: {{ user.credits }}</p>

        <form method="POST">
            <input type="text" name="code" placeholder="Enter Redeem Code">
            <button type="submit">REDEEM</button>
        </form>

        <div class="msg">
            {{ message }}
        </div>
    </div>

</div>

<div class="bottom">
    <a href="/dashboard">🏠</a>
    <a href="/redeem">🎁</a>
    <a href="/logout">🚪</a>
</div>

</body>
</html>
