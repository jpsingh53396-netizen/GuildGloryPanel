<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:320px;
padding:20px;
background:#151515;
border:1px solid #ff6a00;
border-radius:12px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:8px 0;
background:#111;
border:1px solid #333;
color:white;
border-radius:8px;
}

button{
width:100%;
padding:10px;
background:#ff6a00;
border:none;
color:white;
border-radius:8px;
margin-top:10px;
}

a{
color:#ff6a00;
text-decoration:none;
display:block;
margin-top:10px;
}

</style>

</head>

<body>

<div class="box">

<h2>LOGIN</h2>

<form action="https://guildglorypanel-in.onrender.com/login" method="POST">

<input type="email" name="email" placeholder="Email" required>
<input type="password" name="password" placeholder="Password" required>

<button type="submit">LOGIN</button>

</form>

<a href="/register">Create Account</a>

<!-- 💀 ADMIN LOGIN LINK -->
<a href="/admin">💀 Admin Login</a>

</div>

</body>
</html>
